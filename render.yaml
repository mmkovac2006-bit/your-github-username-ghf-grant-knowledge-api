services:
  - type: web
    name: ghf-grant-knowledge-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GHF_ACTION_API_KEY
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
      - key: DROPBOX_PATH_ROOT_NAMESPACE_ID
        value: "5698749680"
      - key: DROPBOX_ALLOWED_ROOTS
        value: /4 - Development/1 - Grants/_2026 Grants|/4 - Development/1 - Grants/2025 Grants|/4 - Development/1 - Grants/2024 Grants|/4 - Development/1 - Grants/Grantwriting Resources
      - key: MAX_RESULTS_DEFAULT
        value: "5"
      - key: MAX_RESULTS_LIMIT
        value: "10"
      - key: MAX_EXCERPT_CHARS
        value: "2000"
      - key: REQUEST_TIMEOUT_MS
        value: "20000"
      - key: LOG_LEVEL
        value: info
