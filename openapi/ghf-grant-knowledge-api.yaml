openapi: 3.1.0
info:
  title: GHF Grant Knowledge API
  version: 1.0.0
  description: >
    Dropbox-only v1 middleware for Custom GPT Actions. The GPT sends one grant
    question or a pasted grant application as query text. The server searches
    only the approved Grant Halliburton Foundation Dropbox folders, then returns
    compact source excerpts for the GPT to draft paste-ready grant answers.
servers:
  - url: https://your-github-username-ghf-grant-know.vercel.app
    description: Vercel production deployment.
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: health
      summary: Confirm the service is running.
      security: []
      responses:
        "200":
          description: Service status.
          content:
            application/json:
              schema:
                type: object
                required: [status, service, version]
                properties:
                  status:
                    type: string
                    const: ok
                  service:
                    type: string
                    const: GHF Grant Knowledge API
                  version:
                    type: string
                    const: 1.0.0
  /search:
    post:
      operationId: searchGrantSources
      summary: Find relevant Dropbox source excerpts for a grant question or pasted grant application.
      description: >
        Clients provide only query text. The server automatically searches the
        approved Dropbox folders; clients do not choose folders, paths, years,
        Dropbox roots, namespaces, Supabase, databases, vector stores, or any
        other knowledge source. Dropbox authentication is handled only by the
        middleware through server environment variables. The Custom GPT Action
        authenticates to this API with the configured bearer API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 100000
                  description: One grant question, multiple grant questions, or a pasted grant application/document.
                character_limit:
                  type: integer
                  minimum: 1
                  maximum: 50000
                  description: Optional final-answer character limit for the GPT to honor while drafting.
                max_results:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 5
                  description: Optional number of source excerpts to return.
      responses:
        "200":
          description: Relevant source excerpts from approved Dropbox folders.
          content:
            application/json:
              schema:
                type: object
                required: [query, query_characters, source, searched_folders, results]
                properties:
                  query:
                    type: string
                    description: Compact echo of the submitted query.
                  query_characters:
                    type: integer
                  source:
                    type: string
                    const: dropbox
                  searched_folders:
                    type: array
                    items:
                      type: string
                    description: Server-enforced approved Dropbox folders.
                  results:
                    type: array
                    maxItems: 10
                    items:
                      $ref: "#/components/schemas/SearchResult"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SearchResult:
      type: object
      required: [rank, title, source_file, path, source_path, source_folder, source_category, excerpt, confidence]
      properties:
        rank:
          type: integer
          minimum: 1
          description: Ranking order, with the best result first.
        title:
          type: string
          description: Source title without the file extension.
        source_file:
          type: string
        funder:
          type: [string, "null"]
        year:
          type: [string, "null"]
        path:
          type: string
          description: Safe Dropbox source path inside an approved folder.
        source_path:
          type: string
          description: Same safe Dropbox source path, included for GPT clarity.
        source_folder:
          type: string
          enum:
            - _2026 Grants
            - 2025 Grants
            - 2024 Grants
            - Grantwriting Resources
        source_category:
          type: string
          enum: [approved_grant_folder, grantwriting_resources]
        excerpt:
          type: string
          maxLength: 2000
        confidence:
          type: string
          enum: [high, medium, low]
        document_type:
          type: [string, "null"]
        character_count:
          type: integer
        notes:
          type: string
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

